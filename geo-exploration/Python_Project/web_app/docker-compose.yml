version: '3.8'

services:
  # 主应用服务
  mineral-analysis-app:
    build: .
    container_name: mineral-analysis-app
    ports:
      - "8080:8080"
    volumes:
      # 映射上传目录
      - ./uploads:/app/uploads
      # 映射结果目录
      - ./results:/app/results
      # 映射日志目录
      - ./logs:/app/logs
      # 映射数据目录（可选）
      - /data:/app/data:ro
    environment:
      - FLASK_ENV=production
      - PYTHONPATH=/app
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - mineral-network

  # Redis 缓存服务（可选，用于缓存和任务队列）
  redis:
    image: redis:7-alpine
    container_name: mineral-analysis-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - mineral-network

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: mineral-analysis-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - mineral-analysis-app
    restart: unless-stopped
    networks:
      - mineral-network

  # 数据库（可选，用于存储任务历史）
  postgres:
    image: postgres:14-alpine
    container_name: mineral-analysis-db
    environment:
      POSTGRES_DB: mineral_analysis
      POSTGRES_USER: mineral_user
      POSTGRES_PASSWORD: mineral_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - mineral-network

volumes:
  redis_data:
  postgres_data:

networks:
  mineral-network:
    driver: bridge